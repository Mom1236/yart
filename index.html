<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YART</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #f4efe6;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(201, 169, 110, 0.12), transparent 34%),
        radial-gradient(circle at bottom, rgba(34, 197, 94, 0.06), transparent 28%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .shell {
      width: 100%;
      max-width: 640px;
      border: 1px solid rgba(201, 169, 110, 0.2);
      background: rgba(255,255,255,0.025);
      border-radius: 32px;
      padding: 12px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: riseIn 0.8s ease-out both;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
      border-radius: 28px;
      padding: 48px 32px;
      text-align: center;
    }

    .eyebrow {
      margin-bottom: 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.45em;
      color: #c9a96e;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
      opacity: 0.8;
    }

    .logo-wrap svg {
      width: 36px;
      height: 36px;
      color: #c9a96e;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 4.5rem);
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0.12em;
    }

    .subtext {
      max-width: 470px;
      margin: 20px auto 0;
      font-size: 0.95rem;
      line-height: 1.9;
      color: rgba(244, 239, 230, 0.55);
    }

    .links {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-card {
      position: relative;
      display: block;
      overflow: hidden;
      border-radius: 26px;
      border: 1px solid rgba(201, 169, 110, 0.2);
      background: rgba(18,18,18,0.9);
      padding: 22px 24px;
      text-decoration: none;
      color: inherit;
      transform: translateY(16px);
      opacity: 0;
      animation: riseIn 0.6s ease-out forwards;
    }

    .link-card:nth-child(1) { animation-delay: 0.16s; }
    .link-card:nth-child(2) { animation-delay: 0.24s; }
    .link-card:nth-child(3) { animation-delay: 0.32s; }

    .link-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(201,169,110,0), rgba(201,169,110,0.1), rgba(201,169,110,0));
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .link-inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .link-label {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: #f8f3eb;
    }

    .enter {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: rgba(34, 197, 94, 0.7);
      text-transform: uppercase;
      transition: transform 0.3s ease;
    }

    .link-card:hover .enter {
      transform: translateX(4px);
    }

    .footer-vibe {
      margin-top: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: rgba(244, 239, 230, 0.3);
    }

    .footer-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      display: inline-block;
    }

    .dot.gold { background: rgba(201, 169, 110, 0.7); }
    .dot.green { background: rgba(34, 197, 94, 0.6); }

    .disclaimer {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(244, 239, 230, 0.25);
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 28px 16px;
      }

      .card {
        padding: 36px 20px;
      }

      .link-card {
        padding: 20px 18px;
      }

      .link-label {
        font-size: 1rem;
      }

      .enter {
        font-size: 0.66rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <div class="card">
        <p class="eyebrow">yart.shop</p>

        <div class="logo-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2C10 6 8 7 6 9c2 0 3 1 3 3-2-1-4-1-6 1 3 1 5 2 6 4-2 0-3 1-4 3 3 0 6-2 7-5 1 3 4 5 7 5-1-2-2-3-4-3 1-2 3-3 6-4-2-2-4-2-6-1 0-2 1-3 3-3-2-2-4-3-6-7z" fill="currentColor" />
          </svg>
        </div>

        <h1>YART</h1>
        <p class="subtext">Menu access and updates.</p>

        <div class="links">
          <a class="link-card" href="https://www.snapchat.com/@peter.kyc">
            <div class="link-inner">
              <span class="link-label">Snapchat</span>
              <span class="enter">Enter</span>
            </div>
          </a>

          <a class="link-card" href="https://rentry.co/traplanta/">
            <div class="link-inner">
              <span class="link-label">Menu</span>
              <span class="enter">Enter</span>
            </div>
          </a>

          <a class="link-card" href="/drops.html">
            <div class="link-inner">
              <span class="link-label">New Updates</span>
              <span class="enter">Enter</span>
            </div>
          </a>
        </div>

        <div class="footer-vibe">
          <div class="footer-row">
            <span>Private</span>
            <span class="dot gold"></span>
            <span>Curated</span>
            <span class="dot green"></span>
            <span>Exclusive</span>
          </div>

          <p class="disclaimer">21+ ONLY · NO PUBLIC ACCESS</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
